name: Ticket Bot

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v3

      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          pip install playwright requests
          playwright install

      - name: Ejecutar bot
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
        run: python bot.py
